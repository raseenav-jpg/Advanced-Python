<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Student Management System</title>
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://mmmggjhgfmkhnzubkoib.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1tbWdnamhnZm1raG56dWJrb2liIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg4MzU0NzgsImV4cCI6MjA5NDQxMTQ3OH0.RgLR8AYaHwXJncqzL4zVmvQMrlg2BUkH7IFGIzyC0kU';
        window.supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    </script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="dashboard.css">
</head>
<body>
    <div class="container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo">
                <span class="logo-icon">🎓</span>
                <h2>EduManage</h2>
            </div>
            <nav>
                <ul>
                    <li class="active" onclick="window.location.href='dashboard.html'"><span>👥</span> Students</li>
                    <li onclick="window.location.href='add-student.html'"><span>➕</span> Add Student</li>
                    <li onclick="logout()"><span>🚪</span> Logout</li>
                </ul>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header>
                <div class="header-left">
                    <h1>Admin Dashboard</h1>
                    <p>Manage your students and academic records</p>
                </div>
                <div class="header-right">
                    <button class="btn btn-primary" onclick="window.location.href='add-student.html'">+ New Student</button>
                </div>
            </header>

            <!-- Stats Overview -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon" style="background: #e0e7ff; color: #4f46e5;">👥</div>
                    <div class="stat-info">
                        <h3>Total Students</h3>
                        <p id="totalStudentsCount">0</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon" style="background: #fef3c7; color: #d97706;">📚</div>
                    <div class="stat-info">
                        <h3>Total Courses</h3>
                        <p id="totalCoursesCount">0</p>
                    </div>
                </div>
            </div>

            <!-- Student List Table -->
            <section class="table-section">
                <div class="table-header">
                    <h2>Student List</h2>
                    <div class="search-box">
                        <span>🔍</span>
                        <input type="text" id="studentSearch" placeholder="Search by name, ID, or email..." oninput="filterStudents()">
                    </div>
                </div>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Student ID</th>
                                <th>Name</th>
                                <th>Course</th>
                                <th>Email</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="studentTableBody">
                            <!-- Rows will be injected here by dashboard.js -->
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>


    <!-- Edit Student Modal -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Edit Student Details</h2>
                <span class="close" onclick="closeModal('editModal')">&times;</span>
            </div>
            <form id="editStudentForm" class="modal-form">
                <input type="hidden" id="edit_record_id">
                <div class="form-row">
                    <div class="form-group">
                        <label>Student ID</label>
                        <input type="text" id="edit_s_id" required>
                    </div>
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="edit_s_name" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="edit_s_email" required>
                    </div>
                    <div class="form-group">
                        <label>Phone Number</label>
                        <input type="tel" id="edit_s_phone" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Gender</label>
                        <select id="edit_s_gender" style="width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px; outline: none;" required>
                            <option value="">Select Gender</option>
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Course</label>
                        <input type="text" id="edit_s_course" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Semester</label>
                        <input type="text" id="edit_s_semester" required>
                    </div>
                    <div class="form-group">
                        <label>Department</label>
                        <input type="text" id="edit_s_department" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Admission Year</label>
                    <input type="text" id="edit_s_admission_year" required>
                </div>
                <button type="submit" class="btn btn-primary full-width">Update Student</button>
            </form>
        </div>
    </div>

    <!-- Student Detail Modal -->
    <div id="detailModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Student Profile</h2>
                <span class="close" onclick="closeModal('detailModal')">&times;</span>
            </div>
            <div id="studentDetailView" class="detail-view">
                <!-- Details injected here -->
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="dashboard.js"></script>
</body>
</html>
